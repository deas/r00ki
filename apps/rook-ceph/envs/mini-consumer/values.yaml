# Default values for a single rook-ceph cluster
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Namespace of the main rook operator
operatorNamespace: rook-ceph

# -- The metadata.name of the CephCluster CR
# @default -- The same as the namespace
clusterName:

# -- Optional override of the target kubernetes version
kubeVersion:

# -- Cluster ceph.conf override
configOverride:
# configOverride: |
#   [global]
#   mon_allow_pool_delete = true
#   osd_pool_default_size = 3
#   osd_pool_default_min_size = 2

resources:

# -- Global log level for the operator.
# Options: `ERROR`, `WARNING`, `INFO`, `DEBUG`
logLevel: DEBUG

monitoring:
  # -- Enable monitoring. Requires Prometheus to be pre-installed.
  # Enabling will also create RBAC rules to allow Operator to create ServiceMonitors
  enabled: true

# Ceph-CSI is managed by the ceph-csi-operator subchart as of Rook 1.17. The old
# csi.* tuning keys (enableLiveness, enableGrpcMetrics, csi*Resource, enable*Driver,
# cephFSKernelMountOptions, ...) no longer exist in this chart, and because the chart
# ships no values.schema.json they would be silently ignored rather than rejected.
# Per-driver settings now live in the ceph-csi-operator OperatorConfig/Driver CRs.
csi:
  # -- Install the ceph-csi-operator subchart, which deploys the RBD/CephFS drivers.
  installCsiOperator: true
  serviceMonitor:
    # -- Enable ServiceMonitor for CSI metrics
    enabled: true
