# Default values for a single rook-ceph cluster
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Namespace of the main rook operator
operatorNamespace: rook-ceph

# -- The metadata.name of the CephCluster CR
# @default -- The same as the namespace
clusterName:

# -- Optional override of the target kubernetes version
kubeVersion:

# -- Cluster ceph.conf override
configOverride:
# configOverride: |
#   [global]
#   mon_allow_pool_delete = true
#   osd_pool_default_size = 3
#   osd_pool_default_min_size = 2

# resources:

# A service cluster serves Ceph but never mounts it, so it needs no CSI drivers.
# As of Rook 1.20 the csi.enable{Rbd,Cephfs}Driver toggles are gone; skipping the
# ceph-csi-operator subchart entirely is the equivalent. The consumer cluster runs
# its own csi-operator plus the ceph-csi-drivers chart.
csi:
  installCsiOperator: false

# -- Global log level for the operator.
# Options: `ERROR`, `WARNING`, `INFO`, `DEBUG`
logLevel: DEBUG

monitoring:
  # -- Enable Prometheus integration, will also create necessary RBAC rules to allow Operator to create ServiceMonitors.
  # Monitoring requires Prometheus to be pre-installed
  enabled: true
